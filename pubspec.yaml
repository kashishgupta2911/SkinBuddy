name: skinbuddy
description: SkinBuddy triage tool
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
#  firebase_storage: ^13.0.0
  cloud_firestore: ^6.3.0
  image_picker: ^1.1.2
  image: ^4.2.0
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/
    - assets/models/model.tflite
    - assets/models/labels.txt
